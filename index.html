<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Do List</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #020203;
      --card: rgba(18, 18, 22, 0.72);
      --card-solid: #111116;
      --line: rgba(255, 255, 255, 0.1);
      --line-strong: rgba(255, 255, 255, 0.18);
      --text: #f5f5f7;
      --muted: #a1a1aa;
      --dim: #6f6f78;
      --accent: #34d399;
      --accent-soft: rgba(52, 211, 153, 0.16);
      --danger: #ff5f57;
      --danger-soft: rgba(255, 95, 87, 0.12);
      --shadow: rgba(0, 0, 0, 0.52);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% -10%, rgba(255, 255, 255, 0.16), transparent 28%),
        radial-gradient(circle at 18% 12%, rgba(52, 211, 153, 0.16), transparent 26%),
        radial-gradient(circle at 90% 25%, rgba(255, 255, 255, 0.08), transparent 24%),
        linear-gradient(180deg, #111115 0%, #050507 44%, #000 100%);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .page {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
    }

    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 0.95fr;
      align-items: center;
      gap: 44px;
      padding: 40px 0 80px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      height: 36px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
      backdrop-filter: blur(18px);
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 22px rgba(52, 211, 153, 0.8);
    }

    h1 {
      margin: 0;
      max-width: 680px;
      font-size: clamp(48px, 7.5vw, 96px);
      line-height: 0.96;
      letter-spacing: 0;
      font-weight: 780;
    }

    .hero-copy {
      margin: 26px 0 0;
      max-width: 570px;
      color: var(--muted);
      font-size: clamp(18px, 2vw, 22px);
      line-height: 1.55;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 34px;
      flex-wrap: wrap;
    }

    .primary-link,
    .ghost-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 20px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
    }

    .primary-link {
      color: #04110c;
      background: var(--accent);
      box-shadow: 0 16px 40px rgba(52, 211, 153, 0.25);
    }

    .ghost-link {
      color: var(--text);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
    }

    .hero-art {
      position: relative;
      min-height: 520px;
      border-radius: 34px;
      border: 1px solid var(--line);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.02)),
        #08080a;
      box-shadow:
        0 40px 120px var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .hero-art::before {
      content: "";
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      top: 34px;
      right: 24px;
      background: radial-gradient(circle, rgba(52, 211, 153, 0.22), transparent 68%);
      filter: blur(10px);
    }

    .hero-art::after {
      content: "";
      position: absolute;
      inset: auto 34px 32px 34px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28), transparent);
    }

    .hero-svg {
      position: relative;
      width: min(94%, 620px);
      height: auto;
    }

    .app {
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 22px;
      padding-bottom: 46px;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 28px;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(24px);
    }

    .composer {
      padding: 24px;
      align-self: start;
    }

    .panel-title {
      margin: 0;
      font-size: 23px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .summary {
      margin: 12px 0 22px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    .todo-form {
      display: grid;
      gap: 12px;
    }

    .todo-input {
      width: 100%;
      min-height: 52px;
      padding: 0 16px;
      color: var(--text);
      border-radius: 17px;
      border: 1px solid var(--line);
      outline: none;
      background: rgba(255, 255, 255, 0.06);
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .todo-input::placeholder {
      color: var(--dim);
    }

    .todo-input:focus {
      border-color: rgba(52, 211, 153, 0.72);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 5px rgba(52, 211, 153, 0.13);
    }

    .add-btn {
      min-height: 52px;
      border-radius: 17px;
      color: #03110b;
      background: linear-gradient(135deg, #8bffdc, #34d399 46%, #10b981);
      font-size: 16px;
      font-weight: 800;
      box-shadow: 0 18px 40px rgba(52, 211, 153, 0.2);
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .add-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .stat {
      padding: 16px 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.055);
    }

    .stat strong {
      display: block;
      font-size: 28px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat span {
      color: var(--dim);
      font-size: 13px;
    }

    .tasks {
      padding: 24px;
      min-height: 500px;
    }

    .task-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
      margin-bottom: 20px;
    }

    .task-head-left p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }

    .filters {
      display: flex;
      gap: 6px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: rgba(255, 255, 255, 0.055);
    }

    .filter-btn {
      min-width: 72px;
      height: 38px;
      padding: 0 12px;
      border-radius: 13px;
      background: transparent;
      color: var(--muted);
      font-weight: 760;
      transition: background 0.16s ease, color 0.16s ease;
    }

    .filter-btn.active {
      background: #f5f5f7;
      color: #050506;
    }

    .utility-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .save-state {
      color: var(--dim);
      font-size: 13px;
    }

    .clear-btn {
      height: 38px;
      padding: 0 13px;
      border-radius: 13px;
      color: var(--danger);
      background: var(--danger-soft);
      font-weight: 760;
      transition: transform 0.16s ease, background 0.16s ease;
    }

    .clear-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 95, 87, 0.18);
    }

    .todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    .todo-item {
      display: grid;
      grid-template-columns: 44px 1fr 40px;
      align-items: center;
      gap: 12px;
      min-height: 68px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.035)),
        rgba(255, 255, 255, 0.035);
      animation: itemIn 0.22s ease both;
    }

    @keyframes itemIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .check-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--line-strong);
      color: transparent;
      background: rgba(255, 255, 255, 0.06);
      font-size: 21px;
      font-weight: 900;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    }

    .todo-item.done .check-btn {
      color: #04110c;
      border-color: var(--accent);
      background: var(--accent);
    }

    .todo-text {
      min-width: 0;
      color: var(--text);
      font-size: 16px;
      line-height: 1.45;
      overflow-wrap: anywhere;
      transition: color 0.18s ease;
    }

    .todo-item.done .todo-text {
      color: #73737c;
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }

    .delete-btn {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      color: var(--danger);
      background: var(--danger-soft);
      font-size: 24px;
      line-height: 1;
      transition: transform 0.16s ease, background 0.16s ease;
    }

    .delete-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 95, 87, 0.2);
    }

    .empty {
      margin-top: 58px;
      text-align: center;
      color: var(--dim);
      line-height: 1.7;
    }

    .empty-icon {
      width: 70px;
      height: 70px;
      margin: 0 auto 16px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--accent);
      font-size: 32px;
    }

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
        padding-top: 62px;
      }

      .hero-art {
        min-height: 420px;
      }

      .app {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 28px, 1180px);
      }

      .hero {
        padding: 34px 0 46px;
        gap: 28px;
      }

      h1 {
        font-size: clamp(44px, 13vw, 66px);
      }

      .hero-copy {
        font-size: 17px;
      }

      .hero-art {
        min-height: 320px;
        border-radius: 26px;
      }

      .composer,
      .tasks {
        padding: 18px;
      }

      .task-head {
        grid-template-columns: 1fr;
      }

      .filters {
        width: 100%;
      }

      .filter-btn {
        flex: 1;
        min-width: 0;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .todo-item {
        grid-template-columns: 40px 1fr 38px;
        gap: 10px;
      }

      .check-btn {
        width: 40px;
        height: 40px;
      }

      .delete-btn {
        width: 38px;
        height: 38px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-text">
        <div class="brand">
          <span class="brand-dot"></span>
          <span>To Do List</span>
        </div>

        <h1>把今天，整理成清晰的一天。</h1>

        <p class="hero-copy">
          每一个任务，都安静地待在该在的位置。添加，完成，删除，自动保存。
          打开页面，就能继续你的节奏。
        </p>

        <div class="hero-actions">
          <a class="primary-link" href="#todoApp">开始记录</a>
          <a class="ghost-link" href="#todoApp">查看任务</a>
        </div>
      </div>

      <div class="hero-art" aria-hidden="true">
        <svg class="hero-svg" viewBox="0 0 720 560" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="360" cy="476" rx="260" ry="28" fill="#030304" />

    </section>

    <section class="app" id="todoApp">
      <aside class="panel composer">
        <h2 class="panel-title">添加任务</h2>
        <p class="summary" id="summary">今天还没有任务。先写下第一件事。</p>

        <form class="todo-form" id="todoForm">
          <input
            class="todo-input"
            id="todoInput"
            type="text"
            placeholder="输入今天要完成的事..."
            autocomplete="off"
            maxlength="80"
          />
          <button class="add-btn" type="submit">添加任务</button>
        </form>

        <div class="stats">
          <div class="stat">
            <strong id="totalCount">0</strong>
            <span>全部</span>
          </div>
          <div class="stat">
            <strong id="activeCount">0</strong>
            <span>进行中</span>
          </div>
          <div class="stat">
            <strong id="doneCount">0</strong>
            <span>已完成</span>
          </div>
        </div>
      </aside>

      <section class="panel tasks">
        <div class="task-head">
          <div class="task-head-left">
            <h2 class="panel-title">今日任务</h2>
            <p>你的清单会自动保存在当前浏览器中。</p>
          </div>

          <div class="filters" aria-label="任务筛选">
            <button class="filter-btn active" type="button" data-filter="all">全部</button>
            <button class="filter-btn" type="button" data-filter="active">进行中</button>
            <button class="filter-btn" type="button" data-filter="done">已完成</button>
          </div>
        </div>

        <div class="utility-row">
          <span class="save-state" id="saveState">已自动保存</span>
          <button class="clear-btn" type="button" id="clearDone">清除已完成</button>
        </div>

        <ul class="todo-list" id="todoList"></ul>

        <div class="empty" id="emptyState" hidden>
          <div class="empty-icon">✓</div>
          <div>这里还没有任务。</div>
          <div>添加一个小目标，让今天开始变清楚。</div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "premium_black_todo_list_v1";

    const form = document.getElementById("todoForm");
    const input = document.getElementById("todoInput");
    const list = document.getElementById("todoList");
    const emptyState = document.getElementById("emptyState");
    const summary = document.getElementById("summary");
    const clearDoneButton = document.getElementById("clearDone");
    const saveState = document.getElementById("saveState");
    const filterButtons = document.querySelectorAll(".filter-btn");

    const totalCount = document.getElementById("totalCount");
    const activeCount = document.getElementById("activeCount");
    const doneCount = document.getElementById("doneCount");

    let todos = loadTodos();
    let currentFilter = "all";

    function loadTodos() {
      try {
        const savedTodos = localStorage.getItem(STORAGE_KEY);
        return savedTodos ? JSON.parse(savedTodos) : [];
      } catch (error) {
        return [];
      }
    }

    function saveTodos() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
      saveState.textContent = "已自动保存";
    }

    function createTodo(text) {
      return {
        id: Date.now().toString(),
        text: text,
        done: false,
        createdAt: new Date().toISOString()
      };
    }

    function getVisibleTodos() {
      if (currentFilter === "active") {
        return todos.filter(function(todo) {
          return !todo.done;
        });
      }

      if (currentFilter === "done") {
        return todos.filter(function(todo) {
          return todo.done;
        });
      }

      return todos;
    }

    function updateStats() {
      const total = todos.length;
      const done = todos.filter(function(todo) {
        return todo.done;
      }).length;
      const active = total - done;

      totalCount.textContent = total;
      activeCount.textContent = active;
      doneCount.textContent = done;

      if (total === 0) {
        summary.textContent = "今天还没有任务。先写下第一件事。";
      } else if (active === 0) {
        summary.textContent = "今天的任务都完成了。干得漂亮。";
      } else {
        summary.textContent = "你有 " + total + " 个任务，" + active + " 个还在进行中。";
      }
    }

    function renderTodos() {
      const visibleTodos = getVisibleTodos();

      list.innerHTML = "";
      emptyState.hidden = visibleTodos.length > 0;

      visibleTodos.forEach(function(todo) {
        const item = document.createElement("li");
        item.className = "todo-item" + (todo.done ? " done" : "");

        const checkButton = document.createElement("button");
        checkButton.className = "check-btn";
        checkButton.type = "button";
        checkButton.textContent = "✓";
        checkButton.title = todo.done ? "标记为未完成" : "标记完成";
        checkButton.setAttribute("aria-label", todo.done ? "标记为未完成" : "标记完成");
        checkButton.addEventListener("click", function() {
          toggleTodo(todo.id);
        });

        const text = document.createElement("span");
        text.className = "todo-text";
        text.textContent = todo.text;

        const deleteButton = document.createElement("button");
        deleteButton.className = "delete-btn";
        deleteButton.type = "button";
        deleteButton.textContent = "×";
        deleteButton.title = "删除任务";
        deleteButton.setAttribute("aria-label", "删除任务");
        deleteButton.addEventListener("click", function() {
          deleteTodo(todo.id);
        });

        item.appendChild(checkButton);
        item.appendChild(text);
        item.appendChild(deleteButton);
        list.appendChild(item);
      });

      updateStats();
      saveTodos();
    }

    function addTodo(text) {
      todos.unshift(createTodo(text));
      saveState.textContent = "正在保存...";
      renderTodos();
    }

    function toggleTodo(id) {
      todos = todos.map(function(todo) {
        if (todo.id === id) {
          return {
            id: todo.id,
            text: todo.text,
            done: !todo.done,
            createdAt: todo.createdAt
          };
        }

        return todo;
      });

      saveState.textContent = "正在保存...";
      renderTodos();
    }

    function deleteTodo(id) {
      todos = todos.filter(function(todo) {
        return todo.id !== id;
      });

      saveState.textContent = "正在保存...";
      renderTodos();
    }

    function clearDoneTodos() {
      todos = todos.filter(function(todo) {
        return !todo.done;
      });

      saveState.textContent = "正在保存...";
      renderTodos();
    }

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      const text = input.value.trim();

      if (!text) {
        input.focus();
        return;
      }

      addTodo(text);
      input.value = "";
      input.focus();
    });

    filterButtons.forEach(function(button) {
      button.addEventListener("click", function() {
        filterButtons.forEach(function(item) {
          item.classList.remove("active");
        });

        button.classList.add("active");
        currentFilter = button.dataset.filter;
        renderTodos();
      });
    });

    clearDoneButton.addEventListener("click", function() {
      clearDoneTodos();
    });

    renderTodos();
  </script>
</body>
</html>
